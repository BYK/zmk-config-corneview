# Corne RGB Underglow (WS2812 addressable strip)
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y

# Don't auto-enable RGB on boot (saves battery). Toggle via ADJUST layer.
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=n

# Corne OLED / nice_view display
CONFIG_ZMK_DISPLAY=y

# Idle/deep-sleep to save battery (mirrors QMK RGBLIGHT_SLEEP behavior).
CONFIG_ZMK_SLEEP=y
