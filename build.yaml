# This file generates the GitHub Actions matrix.
# For simple board + shield combinations, add them to the top level board and
# shield arrays, for more control, add individual board + shield combinations
# to the `include` property. You can also use the `cmake-args` property to
# pass flags to the build command, `snippet` to add a Zephyr snippet, and
# `artifact-name` to assign a name to distinguish build outputs from each other:
#
# board: [ "nice_nano" ]
# shield: [ "corne_left", "corne_right" ]
# include:
#   - board: bdn9_rev2
#   - board: nice_nano
#     shield: reviung41
#   - board: nice_nano
#     shield: corne_left
#     snippet: studio-rpc-usb-uart
#     cmake-args: -DCONFIG_ZMK_STUDIO=y
#     artifact-name: corne_left_with_studio
#
---
include:
  # --- Corne v2 (nice_nano_v2 + nice_view) ---
  - board: nice_nano_v2
    shield: corne_left nice_view_adapter nice_view
  - board: nice_nano_v2
    shield: corne_right nice_view_adapter nice_view

  # --- Corne Min (MechboardsLTD custom boards + rgbled_adapter) ---
  - board: corne_min_left
    shield: rgbled_adapter
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y -DCONFIG_ZMK_STUDIO_LOCKING=n -DCONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
    artifact-name: corne_min_left_with_studio
  - board: corne_min_right
    shield: rgbled_adapter
    cmake-args: -DCONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
    artifact-name: corne_min_right

  # --- Settings reset images (wipe ALL Bluetooth bonds, incl. split pairing) ---
  # Flash to a half, let it boot once, then reflash the normal firmware.
  - board: nice_nano_v2
    shield: settings_reset
    artifact-name: corne_reset
  - board: corne_min_left
    shield: settings_reset
    artifact-name: corne_min_left_reset
  - board: corne_min_right
    shield: settings_reset
    artifact-name: corne_min_right_reset
